jenkins:
  systemMessage: "Jenkins Training Environment - Automatisch konfiguriert"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 3

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "{{ADMIN_USER}}"
          password: "{{ADMIN_PASSWORD}}"

  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:{{ADMIN_USER}}"
        - "Overall/Read:authenticated"

  remotingSecurity:
    enabled: true

security:
  scriptApproval:
    approvedSignatures: []

unclassified:
  location:
    url: "{{JENKINS_CASC_URL}}"
    adminAddress: "admin@jenkins-training.local"

  locale:
    systemLocale: "de_DE"
    ignoreAcceptLanguage: false

tool:
  git:
    installations:
      - name: "Default"
        home: "git"
  jdk:
    installations:
      - name: "JDK {{JAVA_VERSION}}"
        home: "/usr/lib/jvm/java-{{JAVA_VERSION}}-openjdk-amd64"
